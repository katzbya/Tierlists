name: Build & Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: "*.exe"
            name: Windows
          - os: macos-latest
            artifact: "*.dmg"
            name: macOS
          - os: ubuntu-latest
            artifact: "*.AppImage"
            name: Linux

    runs-on: ${{ matrix.os }}
    name: Build for ${{ matrix.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: claude/optimistic-curie-432jbf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tierlist-app/package-lock.json

      - name: Install dependencies
        working-directory: tierlist-app
        run: npm ci

      - name: Build Next.js + Electron package
        working-directory: tierlist-app
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://oxhsygrwgwsdnejnwgwf.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_akZmvSZ8AaoJc3_WQOcc7A_JMwR7evh"
        run: npm run build:electron

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TierForge-${{ matrix.name }}
          path: |
            tierlist-app/dist/${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TierForge ${{ github.ref_name }}
          body: |
            ## TierForge ${{ github.ref_name }}

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | Windows  | `TierForge Setup *.exe` |
            | macOS    | `TierForge *.dmg` |
            | Linux    | `TierForge *.AppImage` |
          files: artifacts/**/*
          draft: false
          prerelease: false
